name: Integration Pending

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  clear-integration-status:
    name: Clear Integration Status
    runs-on: ubuntu-latest
    permissions:
      statuses: write
      pull-requests: write
    steps:
      - name: Log Ref Details
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.event.repository.owner.login }}
          REPO: ${{ github.event.repository.name }}
          REF: ${{ github.event.pull_request.base.ref }}
        run: |
          echo "github.event.pull_request.head.ref: ${{ github.event.pull_request.head.ref }}"
          echo "github.event.pull_request.base.ref: ${{ github.event.pull_request.base.ref }}"
          echo
          echo "github.ref: ${{ github.ref }}"
          echo "github.ref_protected: ${{ github.ref_protected }}"
          gh api graphql \
            -f owner="$OWNER" \
            -f repo="$REPO" \
            -f ref="$REF" \
            -f query='
              query( $owner: String!, $repo: String!, $ref: String! )
              {
                repository( owner: $owner, name: $repo )
                {
                  ref( qualifiedName: $ref )
                  {
                    branchProtectionRule
                  }
                }
              }'

      - name: Set Commit Status
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.event.pull_request.head.repo.full_name }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "/repos/${REPO}/statuses/${SHA}" \
            -f state="pending" \
            -f context="integration-check"

      - name: Remove Integration Labels
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.event.repository.owner.login }}
          REPO: ${{ github.event.repository.name }}
          NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh api \
            --method DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "/repos/${OWNER}/${REPO}/issues/${NUMBER}/labels/integration-ready" \
            || echo "Failed to remove label: integration-ready"
          gh api \
            --method DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "/repos/${OWNER}/${REPO}/issues/${NUMBER}/labels/integration-running" \
            || echo "Failed to remove label: integration-running"
          gh api \
            --method DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "/repos/${OWNER}/${REPO}/issues/${NUMBER}/labels/integration-success" \
            || echo "Failed to remove label: integration-success"
          gh api \
            --method DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "/repos/${OWNER}/${REPO}/issues/${NUMBER}/labels/integration-failure" \
            || echo "Failed to remove label: integration-failure"
