name: Integration Reset

on:
  push:

jobs:
  reset-integration-status:
    name: Reset Integration Status
    permissions:
      statuses: write
      pull-requests: write
    if: github.ref_protected == true
    runs-on: ubuntu-latest
    steps:
      - name: Logging
        run: |
          echo "Actor: ${{ github.actor }}"
          echo "Triggering Actor: ${{ github.triggering_actor }}"

      - name: Reset Pull Requsts
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.event.repository.owner.login }}
          REPO: ${{ github.event.repository.name }}
          REF: ${{ github.ref_name }}
        run: |
          echo "Owner: $OWNER"
          echo "Repo: $REPO"
          echo "Ref: $REF"

          CURSOR=null

          while true
          do
            RESPONSE="$(
              gh api graphql \
                -f owner="$OWNER" \
                -f repo="$REPO" \
                -f ref="$REF" \
                -F cursor="$CURSOR" \
                -f query='
                  query( $owner: String!, $repo: String!, $ref: String!, $cursor: String )
                  {
                    repository( owner: $owner, name: $repo )
                    {
                      pullRequests( baseRefName: $ref, states:OPEN, first: 100, after: $cursor )
                      {
                        nodes
                        {
                          number
                          title
                          state
                          statusCheckRollup
                          {
                            state
                          }
                          headRef
                          {
                            repository
                            {
                              nameWithOwner
                            }
                          }
                          headRefName
                          headRefOid
                        }
                        pageInfo
                        {
                          hasNextPage
                          endCursor
                        }
                      }
                    }
                  }' )"

            echo "$RESPONSE" | jq -r '
              .data.repository.pullRequests.nodes[]
              | [
                .number,
                .title,
                .state,
                (.statusCheckRollup.state // "NONE"),
                .headRef.repository.nameWithOwner,
                .headRefName,
                .headRefOid ]
              | @tsv
            ' | while IFS=$'\t' read -r NUMBER TITLE STATE STATUS_CHECK HEAD_REPO HEAD_REF_NAME HEAD_REF_OID
            do
              if [[ "$STATUS_CHECK" != "SUCCESS" && "$STATUS_CHECK" != "NONE" ]]; then
                continue
              fi

              echo
              echo "Number: $NUMBER"
              echo "Title: $TITLE"
              echo "State: $STATE"
              echo "Status Check: $STATUS_CHECK"
              echo "Head Repo: $HEAD_REPO"
              echo "Head Ref Name: $HEAD_REF_NAME"
              echo "Head Ref OID: $HEAD_REF_OID"

              gh api \
                --method POST \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2026-03-10" \
                "/repos/${HEAD_REPO}/statuses/${HEAD_REF_OID}" \
                -f state="pending" \
                -f context="integration-check"

              gh api \
                --method DELETE \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2026-03-10" \
                "/repos/${OWNER}/${REPO}/issues/${NUMBER}/labels/integration-ready" \
                || echo "Failed to remove label: integration-ready"
              gh api \
                --method DELETE \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2026-03-10" \
                "/repos/${OWNER}/${REPO}/issues/${NUMBER}/labels/integration-running" \
                || echo "Failed to remove label: integration-running"
              gh api \
                --method DELETE \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2026-03-10" \
                "/repos/${OWNER}/${REPO}/issues/${NUMBER}/labels/integration-success" \
                || echo "Failed to remove label: integration-success"
              gh api \
                --method DELETE \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2026-03-10" \
                "/repos/${OWNER}/${REPO}/issues/${NUMBER}/labels/integration-failure" \
                || echo "Failed to remove label: integration-failure"
            done

            HAS_NEXT_PAGE="$(echo "$RESPONSE" | jq -r '.data.repository.pullRequests.pageInfo.hasNextPage')"
            CURSOR="$(echo "$RESPONSE" | jq -r '.data.repository.pullRequests.pageInfo.endCursor')"

            if [[ "$HAS_NEXT_PAGE" != "true" ]]; then
              break
            fi
          done
