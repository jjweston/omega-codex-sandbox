name: Integration Reset

on:
  push:

jobs:
  reset-integration-status:
    name: Reset Integration Status
    runs-on: ubuntu-latest

    steps:
      - name: Logging
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.event.repository.owner.login }}
          REPO: ${{ github.event.repository.name }}
          REF: ${{ github.ref_name }}
        run: |
          echo "Owner: $OWNER"
          echo "Repo: $REPO"
          echo "Ref: $REF"

          CURSOR=null

          while true
          do
            RESPONSE="$(
              gh api graphql \
                -f owner="$OWNER" \
                -f repo="$REPO" \
                -f ref="$REF" \
                -F cursor="$CURSOR" \
                -f query='
                  query( $owner: String!, $repo: String!, $ref: String!, $cursor: String )
                  {
                    repository( owner: $owner, name: $repo )
                    {
                      pullRequests( baseRefName: $ref, states:OPEN, first: 100, after: $cursor )
                      {
                        nodes
                        {
                          number
                          title
                          state
                          statusCheckRollup
                          {
                            state
                          }
                          headRefName
                          headRefOid
                        }
                        pageInfo
                        {
                          hasNextPage
                          endCursor
                        }
                      }
                    }
                  }' )"

            echo "$RESPONSE" | jq -r '
              .data.repository.pullRequests.nodes[]
              | [
                .number,
                .title,
                .state,
                (.statusCheckRollup.state // "NONE"),
                .headRefName,
                .headRefOid ]
              | @tsv
            ' | while IFS=$'\t' read -r NUMBER TITLE STATE STATUS_CHECK HEAD_REF_NAME HEAD_REF_OID
            do
              if [[ "$STATUS_CHECK" != "SUCCESS" && "$STATUS_CHECK" != "NONE" ]]; then
                continue
              fi

              echo
              echo "Number: $NUMBER"
              echo "Title: $TITLE"
              echo "State: $STATE"
              echo "Status Check: $STATUS_CHECK"
              echo "Head Ref Name: $HEAD_REF_NAME"
              echo "Head Ref OID: $HEAD_REF_OID"
            done

            HAS_NEXT_PAGE="$(echo "$RESPONSE" | jq -r '.data.repository.pullRequests.pageInfo.hasNextPage')"
            CURSOR="$(echo "$RESPONSE" | jq -r '.data.repository.pullRequests.pageInfo.endCursor')"

            if [[ "$HAS_NEXT_PAGE" != "true" ]]; then
              break
            fi
          done
