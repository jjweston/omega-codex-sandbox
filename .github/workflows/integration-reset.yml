name: Integration Reset

on:
  push:

jobs:
  reset-integration-status:
    name: Reset Integration Status
    runs-on: ubuntu-latest

    steps:
      - name: Logging
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.event.repository.owner.login }}
          REPO: ${{ github.event.repository.name }}
          REF: ${{ github.event.ref }}
        run: |
          echo "Owner: $OWNER"
          echo "Repo: $REPO"
          echo "Ref: $REF"
          gh api graphql \
            -f owner="$OWNER" \
            -f repo="$REPO" \
            -f query='
              query( $owner: String!, $repo: String! )
              {
                repository( owner: $owner, name: $repo )
                {
                  pullRequests( first: 20 )
                  {
                    nodes
                    {
                      number
                      title
                      state
                      statusCheckRollup
                      {
                        state
                      }
                      baseRefName
                      headRefName
                      headRefOid
                    }
                  }
                }
              }'
